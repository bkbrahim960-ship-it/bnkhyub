version: '3.8'

services:
  # Redis for BullMQ Queue
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  # Self-hosted LibreTranslate (Offline fallback)
  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,ar,fr,es
    restart: always
